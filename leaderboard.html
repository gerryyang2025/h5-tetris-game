<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>俄罗斯方块 - 排行榜</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', Arial, sans-serif;
            background: #0d1117;
            min-height: 100vh;
            color: #c9d1d9;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 28px;
            color: #58a6ff;
            margin-bottom: 10px;
        }

        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: #f6f8fa;
            color: #24292f;
            padding: 10px 24px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 14px;
            font-weight: 600;
            transition: 0.2s;
            border: 1px solid rgba(27,31,35,0.15);
            box-shadow: 0 1px 0 rgba(27,31,35,0.04),inset 0 1px 0 rgba(208,215,222,0.2);
        }

        .back-btn:hover {
            background: #f3f4f6;
        }

        .section {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 6px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .section h2 {
            color: #58a6ff;
            font-size: 18px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #30363d;
        }

        .ranking-table {
            width: 100%;
            border-collapse: collapse;
        }

        .ranking-table th {
            color: #8b949e;
            font-size: 12px;
            font-weight: 600;
            text-align: left;
            padding: 10px;
            border-bottom: 1px solid #30363d;
        }

        .ranking-table td {
            color: #c9d1d9;
            font-size: 14px;
            padding: 12px 10px;
            border-bottom: 1px solid #30363d;
        }

        .ranking-table tr:last-child td {
            border-bottom: none;
        }

        .rank-medal {
            font-size: 18px;
        }

        .rank-number {
            color: #8b949e;
            font-weight: 600;
        }

        .score-value {
            color: #7ee787;
            font-weight: 600;
            font-size: 16px;
        }

        .time-value {
            color: #58a6ff;
        }

        .empty-state {
            text-align: center;
            color: #8b949e;
            padding: 40px 20px;
            font-size: 14px;
        }

        .stats {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin-top: 10px;
            padding: 15px;
            background: #21262d;
            border-radius: 6px;
        }

        .stats-item {
            text-align: center;
        }

        .stats-label {
            color: #8b949e;
            font-size: 12px;
            margin-bottom: 5px;
        }

        .stats-value {
            color: #58a6ff;
            font-size: 20px;
            font-weight: 600;
        }

        .clear-btn {
            display: block;
            margin: 20px auto;
            padding: 10px 24px;
            background: #21262d;
            border: 1px solid #30363d;
            color: #f85149;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .clear-btn:hover {
            background: #30363d;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏆 排行榜</h1>
            <p style="color: #8b949e; margin-bottom: 20px;">俄罗斯方块 - 前10名</p>
            <a href="index.html" class="back-btn">← 返回游戏</a>
        </div>

        <div class="section">
            <h2>📊 我的成绩</h2>
            <div class="stats">
                <div class="stats-item">
                    <div class="stats-label">总游戏次数</div>
                    <div class="stats-value" id="totalGames">0</div>
                </div>
                <div class="stats-item">
                    <div class="stats-label">最高分数</div>
                    <div class="stats-value" id="bestScore">0</div>
                </div>
                <div class="stats-item">
                    <div class="stats-label">最佳用时</div>
                    <div class="stats-value" id="bestTime">--:--</div>
                </div>
            </div>
        </div>

        <div class="section">
            <h2>🥇 排行榜</h2>
            <table class="ranking-table">
                <thead>
                    <tr>
                        <th>排名</th>
                        <th>分数</th>
                        <th>用时</th>
                    </tr>
                </thead>
                <tbody id="leaderboardBody">
                </tbody>
            </table>
            <div id="emptyState" class="empty-state">
                暂无记录，开始游戏来创造你的第一条记录吧！
            </div>
        </div>

        <button class="clear-btn" onclick="clearLeaderboard()">🗑️ 清空排行榜</button>

        <div style="text-align: center; padding: 20px;">
            <a href="index.html" class="back-btn">开始游戏 →</a>
        </div>
    </div>

    <script>
        const LEADERBOARD_KEY = 'tetris_leaderboard';
        
        function getLeaderboard() {
            const data = localStorage.getItem(LEADERBOARD_KEY);
            return data ? JSON.parse(data) : [];
        }
        
        function formatTime(seconds) {
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }
        
        function renderLeaderboard() {
            const leaderboard = getLeaderboard();
            const tbody = document.getElementById('leaderboardBody');
            const emptyState = document.getElementById('emptyState');
            
            // 更新统计数据
            document.getElementById('totalGames').textContent = leaderboard.length;
            
            if (leaderboard.length > 0) {
                const bestScore = Math.max(...leaderboard.map(e => e.score));
                document.getElementById('bestScore').textContent = bestScore;
                
                const bestEntry = leaderboard.reduce((a, b) => a.score >= b.score ? a : b);
                document.getElementById('bestTime').textContent = formatTime(bestEntry.time);
                
                emptyState.style.display = 'none';
            } else {
                document.getElementById('bestScore').textContent = '0';
                document.getElementById('bestTime').textContent = '--:--';
                emptyState.style.display = 'block';
            }
            
            const medals = ['🥇', '🥈', '🥉'];
            let html = '';
            
            leaderboard.forEach((entry, index) => {
                const rankDisplay = index < 3 ? medals[index] : (index + 1);
                const rankClass = index < 3 ? 'rank-medal' : 'rank-number';
                html += `<tr>
                    <td><span class="${rankClass}">${rankDisplay}</span></td>
                    <td><span class="score-value">${entry.score}</span></td>
                    <td><span class="time-value">${formatTime(entry.time)}</span></td>
                </tr>`;
            });
            
            tbody.innerHTML = html;
        }
        
        function clearLeaderboard() {
            if (confirm('确定要清空排行榜吗？此操作不可恢复！')) {
                localStorage.removeItem(LEADERBOARD_KEY);
                renderLeaderboard();
            }
        }
        
        // 页面加载时渲染排行榜
        renderLeaderboard();
    </script>
</body>
</html>
